name: Deploy

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            ENV="staging"
          else
            ENV=""
          fi

          if [ "$ENV" = "production" ]; then
            if [ "${{ github.ref }}" = "refs/heads/master" ]; then
              BRANCH="master"
            else
              BRANCH="main"
            fi
          elif [ "$ENV" = "staging" ]; then
            BRANCH="develop"
          else
            BRANCH=""
          fi

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, gd
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  deploy:
    name: Deploy
    needs: [resolve, test]
    if: needs.resolve.outputs.environment != ''
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch origin
            git checkout "${{ needs.resolve.outputs.branch }}"
            git pull origin "${{ needs.resolve.outputs.branch }}"

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            npm ci
            npm run build

            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart

            curl -fsS "${{ secrets.APP_URL }}/up" >/dev/null
